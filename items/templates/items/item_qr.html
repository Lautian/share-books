{% extends "core/base.html" %}

{% block title %}QR Code – {{ item.title }}{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
    <div class="mb-5 flex flex-wrap gap-2">
        <a class="btn btn-sm btn-outline" href="{% url 'items:item-detail' item.id %}">
            Back to item
        </a>
    </div>

    <article class="rounded-3xl border border-base-300/70 bg-base-100/80 p-6 shadow-2xl md:p-8">
        <header class="border-b border-base-300/70 pb-4">
            <p class="text-sm uppercase tracking-[0.2em] text-success">QR Code</p>
            <h1 class="mt-2 text-3xl font-bold leading-tight">{{ item.title }}</h1>
        </header>

        <div class="mt-6 flex flex-col items-center gap-4">
            <img
                src="{{ qr_data_uri }}"
                alt="QR code for {{ item.title }}"
                class="w-64 rounded-xl border border-base-300/70"
            >
            <p class="text-sm text-base-content/70 break-all text-center">{{ detail_url }}</p>
            <a
                class="btn btn-primary"
                href="?download=1"
                download="qr-item-{{ item.id }}.png"
            >
                Download QR code
            </a>
        </div>
    </article>
</section>
{% endblock %}
