{% extends "core/base.html" %}

{% block title %}Delete Item{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl">
    <article class="rounded-3xl border border-base-300/70 bg-base-100/85 p-6 shadow-2xl md:p-8">
        <header class="border-b border-base-300/70 pb-4">
            <p class="text-sm uppercase tracking-[0.18em] text-error">Danger zone</p>
            <h1 class="mt-2 text-3xl font-bold leading-tight md:text-4xl">Delete Item</h1>
            <p class="mt-3 text-base-content/80">
                You are about to delete <strong>{{ item.title }}</strong>.
            </p>
        </header>

        <p class="mt-5 text-base-content/80">
            This action cannot be undone.
        </p>

        <div class="mt-6 flex flex-wrap gap-2">
            <form method="post" action="{% url 'items:item-delete' item.id %}">
                {% csrf_token %}
                <button class="btn btn-error" type="submit">Delete item</button>
            </form>
            <a class="btn btn-outline" href="{% url 'items:item-detail' item.id %}">Cancel</a>
        </div>
    </article>
</section>
{% endblock %}
